<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Participación Ciudadana</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <main>
    <section class="contenedor">
      <h1>Formulario de Participación Ciudadana</h1>

      <p class="descripcion">
        Este espacio nos permite recoger tus valiosas propuestas, ideas o necesidades para la comunidad. 
        Toda tu información será tratada con respeto y usada exclusivamente con fines de participación y desarrollo comunitario.
      </p>

      <form action="#" method="POST">
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            placeholder="Escribe tu nombre completo"
            required>
        </div>

        <div class="campo">
          <label for="propuesta">Propuesta o mensaje para la comunidad</label>
          <textarea 
            id="propuesta" 
            name="propuesta" 
            placeholder="Describe detalladamente tu propuesta o necesidad..."
            required></textarea>
        </div>

        <div class="campo">
          <label for="contacto">Correo o teléfono de contacto (opcional)</label>
          <input 
            type="text" 
            id="contacto" 
            name="contacto" 
            placeholder="Ej: micorreo@email.com o 3001234567">
        </div>

        <div class="campo campo-checkbox">
          <input type="checkbox" id="consentimiento" name="consentimiento" required>
          <label for="consentimiento">
            Acepto que mi información sea usada responsablemente y de manera segura únicamente para fines de participación comunitaria.
          </label>
        </div>

        <button type="submit">Enviar propuesta</button>
      </form>
    </section>
  </main>

</body>
</html>
