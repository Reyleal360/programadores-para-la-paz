<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma Comunitaria – Módulo 2 Día 2</title>
    <style>
      /* ===== Fuente y reset ===== */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #e0e0ff;
      }

      .tarjeta {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 640px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      }

      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
        background: linear-gradient(90deg, #a78bfa, #60a5fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitulo {
        font-size: 0.85rem;
        color: #9ca3af;
        margin-bottom: 2rem;
      }

      hr {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.1);
        margin: 1.5rem 0;
      }

      h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.8rem;
        color: #c4b5fd;
      }

      /* ===== Botones ===== */
      .btn {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 0.6rem;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }

      .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.35); }
      .btn:active { transform: translateY(0); opacity: 0.85; }

      .btn-campania {
        background: linear-gradient(135deg, #7c3aed, #a78bfa);
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .btn-avisos {
        background: linear-gradient(135deg, #0369a1, #38bdf8);
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .btn-propuesta {
        background: linear-gradient(135deg, #065f46, #34d399);
        color: #fff;
        margin-top: 0.5rem;
      }

      /* ===== Caja de respuesta ===== */
      .respuesta {
        margin-top: 0.75rem;
        padding: 0.8rem 1rem;
        background: rgba(0, 0, 0, 0.3);
        border-left: 3px solid #a78bfa;
        border-radius: 0.5rem;
        font-size: 0.88rem;
        min-height: 2.5rem;
        color: #d1d5db;
        line-height: 1.5;
        transition: all 0.3s ease;
      }

      /* ===== Textarea de propuesta ===== */
      textarea {
        width: 100%;
        padding: 0.7rem 1rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.6rem;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        color: #e0e0ff;
        resize: vertical;
        min-height: 90px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 0.5rem;
      }

      textarea::placeholder { color: #6b7280; }
      textarea:focus { border-color: #a78bfa; }
    </style>
  </head>
  <body>
    <div class="tarjeta">
      <h1>🌐 Plataforma Comunitaria</h1>
      <p class="subtitulo">Módulo 2 · Semana 1 · Día 2 — Comunicación cliente ↔ servidor con fetch</p>

      <hr />

      <!-- Sección GET /api/campania -->
      <h2>📢 Campaña Activa</h2>
      <button id="btnCampania" class="btn btn-campania" onclick="consultarCampania()">
        Consultar campaña
      </button>
      <div id="respuestaCampania" class="respuesta">La respuesta del servidor aparecerá aquí…</div>

      <hr />

      <!-- Sección GET /api/avisos -->
      <h2>🔔 Avisos Comunitarios</h2>
      <button id="btnAvisos" class="btn btn-avisos" onclick="consultarAvisos()">
        Consultar avisos
      </button>
      <div id="respuestaAvisos" class="respuesta">La respuesta del servidor aparecerá aquí…</div>

      <hr />

      <!-- Sección POST /api/propuestas -->
      <h2>✍️ Enviar Propuesta</h2>
      <textarea
        id="campoPropuesta"
        placeholder="Escribe aquí tu propuesta comunitaria para mejorar la plataforma o el barrio…"
      ></textarea>
      <button id="btnPropuesta" class="btn btn-propuesta" onclick="enviarPropuesta()">
        Enviar propuesta
      </button>
      <div id="respuestaEnvio" class="respuesta">La confirmación del servidor aparecerá aquí…</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
