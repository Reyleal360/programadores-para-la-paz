<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participación Comunitaria - Día 5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #6366f1;
            --secondary: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
        }

        #mensajeEstado {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .error { background: rgba(239, 68, 68, 0.2); color: var(--error); border: 1px solid var(--error); display: block !important; }
        .success { background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); display: block !important; }

        .list-container {
            margin-top: 2rem;
        }

        .propuesta-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .propuesta-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .propuesta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .propuesta-titulo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .propuesta-fecha {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .propuesta-mensaje {
            color: var(--text-main);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Voz Ciudadana</h1>
            <p class="subtitle">Módulo 2 · Semana 1 · Día 5 — Promesas y Trazabilidad</p>
        </header>

        <section class="card">
            <h2>✍️ Nueva Propuesta</h2>
            <div id="formularioPropuesta">
                <div class="form-group">
                    <label for="titulo">Título de la propuesta</label>
                    <input type="text" id="titulo" placeholder="Ej: Mejora de iluminación en el parque">
                </div>
                <div class="form-group">
                    <label for="mensaje">Descripción detallada</label>
                    <textarea id="mensaje" rows="4" placeholder="Describe tu propuesta de forma clara y responsable..."></textarea>
                </div>
                <button id="btnEnviar">Enviar Propuesta</button>
            </div>
            <div id="mensajeEstado"></div>
        </section>

        <section class="card list-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>📋 Propuestas Recibidas</h2>
                <button id="btnCargar" class="btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Cargar Propuestas</button>
            </div>
            <div id="listaPropuestas">
                <!-- Las propuestas se cargarán aquí -->
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
