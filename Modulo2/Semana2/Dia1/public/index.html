<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Sitio Comunitario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
        }

        .section {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        .data-list {
            margin-top: 1.5rem;
        }

        .item {
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .item-meta {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏘️ Mini-Sitio Comunitario</h1>
            <p>Semana 5 · Clase 21 — Proyecto Vivo</p>
        </header>

        <section class="section">
            <h2>📬 Mensajes Comunitarios</h2>
            <button id="btnMensajes">Cargar Mensajes</button>
            <div id="listaMensajes" class="data-list"></div>
        </section>

        <section class="section">
            <h2>📅 Calendario Editorial</h2>
            <button id="btnCalendario">Cargar Calendario</button>
            <div id="listaCalendario" class="data-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
